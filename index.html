<!DOCTYPE html>
<!-- [사용 가능한 스킨 테마 목록] data-theme="여기" 에 아래 이름을 복붙하세요!
    1. mint-yellow  : 사이버틱한 민트 배경과 네온 옐로우 (1안 기본)
    2. dark-gold    : 딥 다크 블랙 배경과 고급스런 샴페인 골드 조명 (2안)
    3. nomadic-tribe: 포근한 크림색 배경과 차분한 파스텔 데님-그레이 (3안)
    4. purple-cloud : 깊은 밤 배경 우측상단에 부드럽게 퍼져있는 보라색 구름 (4안)
    5. cyber-trunk  : 일러스트 감성의 네온 핑크 & 사이언 블루 수채화 그라데이션 (5안)
-->
<html lang="ko" data-theme="cyber-trunk">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>wavSMiTH | Game Music Composer &amp; Sound Designer</title>
  <meta name="description"
    content="wavSMiTH - Game Music Composer & Sound Designer portfolio. Explore SFX, BGM, and career works." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;800&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ===================== MAIN SCENE ===================== -->
  <div id="app">

    <!-- 배경 노이즈 텍스처 레이어 -->
    <div class="bg-noise"></div>

    <!-- ===== ORBIT SECTION (left-side on panel open) ===== -->
    <!-- ===== 외부 떠있는 위젯: 언어 전환 (Right Bottom) ===== -->
    <div id="language-switcher">
      <button type="button" class="lang-btn" data-lang="kr" aria-label="한국어로 보기" aria-pressed="false">KR</button>
      <span class="lang-sep">|</span>
      <button type="button" class="lang-btn active" data-lang="en" aria-label="View in English" aria-pressed="true">EN</button>
    </div>

    <section id="orbit-section">

      <!-- 오빗 링 + 타이포그래피 컨테이너 -->
      <div id="orbit-container">

        <!-- SVG 궤도 링 -->
        <svg id="orbit-ring" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
          <!-- 메인 궤도 선 -->
          <circle class="orbit-path" cx="250" cy="250" r="200" />
          <!-- 데코 내부 원 (점선보다 작게, 살짝 크게) -->
          <circle class="orbit-inner" cx="250" cy="250" r="185" />
          <!-- 카테고리 노드 위치 가이드 (JS에서 동적 생성) -->
        </svg>

        <!-- 카테고리 버튼 (orbit 위의 작은 원형 마커) -->
        <div id="orbit-nodes">
          <button type="button" class="orbit-node" data-category="sfx" data-angle="-45" aria-label="Sound FX" aria-pressed="false"></button>
          <button type="button" class="orbit-node" data-category="bgm" data-angle="27" aria-label="BGM" aria-pressed="false"></button>
          <button type="button" class="orbit-node" data-category="career" data-angle="99" aria-label="Career" aria-pressed="false"></button>
          <button type="button" class="orbit-node" data-category="artive" data-angle="171" aria-label="ARTIVE SOUND contact"></button>
          <button type="button" class="orbit-node" data-category="youtube" data-angle="243" aria-label="wavSMiTH YouTube channel"></button>
        </div>

        <!-- 카테고리 텍스트 레이블 (orbit 바깥쪽) -->
        <div id="orbit-labels">
          <div class="orbit-label" data-category="sfx" data-angle="-45" data-i18n="orbit_sfx">Sound FX</div>
          <div class="orbit-label" data-category="bgm" data-angle="27" data-i18n="orbit_bgm">BGM</div>
          <div class="orbit-label" data-category="career" data-angle="99" data-i18n="orbit_career">CAREER</div>
          <div class="orbit-label" data-category="artive" data-angle="171" data-i18n-html="orbit_artive">ARTIVE
            SOUND<br><span class="orbit-sub-label">(Contact)</span></div>
          <div class="orbit-label" data-category="youtube" data-angle="243" data-i18n="orbit_youtube">YOUTUBE</div>
        </div>

        <!-- 중앙 타이포 -->
        <div id="orbit-center-text">
          <h1 class="title-main" data-i18n="title_main">wavSMiTH</h1>
          <p class="title-sub" data-i18n-html="title_sub">Game Music Composer<br />&amp; Sound Designer</p>
        </div>

      </div>
    </section>

    <!-- ===== CONTENT PANEL (우측 슬라이드 인) ===== -->
    <aside id="content-panel" aria-hidden="true">
      <button type="button" id="panel-close" aria-label="Close panel">&#x2715;</button>

      <!-- SFX 패널 -->
      <div class="panel-content" id="panel-sfx" hidden>
        <h2 class="panel-title" data-i18n="panel_sfx_title">SFX</h2>
        <p class="panel-desc" data-i18n="panel_sfx_desc">Sound Effects — Game UI, Environments, Character Foley</p>
        <div id="tracklist-sfx">
          <!-- data_loader.js가 CSV에서 동적 생성 -->
        </div>
      </div>

      <!-- BGM 패널 -->
      <div class="panel-content" id="panel-bgm" hidden>
        <h2 class="panel-title" data-i18n="panel_bgm_title">BGM</h2>
        <p class="panel-desc" data-i18n="panel_bgm_desc">Background Music — In Game</p>
        <div id="tracklist-bgm">
          <!-- data_loader.js가 CSV에서 동적 생성 -->
        </div>
      </div>

      <!-- Career 패널 -->
      <div class="panel-content" id="panel-career" hidden>
        <h2 class="panel-title" data-i18n="panel_career_title">Career</h2>
        <p class="panel-desc" data-i18n="panel_career_desc">Work history, projects, and collaborations.</p>
        <!-- 폴더 1: 타임라인 -->
        <div class="yt-folder open" id="career-timeline-folder">
          <div class="yt-folder-title" data-i18n="career_folder_1">Timeline / History</div>
          <div class="folder-content-wrapper">
            <div class="folder-content">
              <ul class="career-list" id="career-timeline-list">
                <!-- data_loader.js가 CSV에서 동적 생성 -->
              </ul>
            </div>
          </div>
        </div>

        <!-- 폴더 2: 게임 프로젝트 -->
        <div class="yt-folder open" id="career-project-folder">
          <div class="yt-folder-title" data-i18n="career_folder_2">Game Projects</div>
          <div class="folder-content-wrapper">
            <div class="folder-content">
              <div class="career-grid" id="career-project-grid">
                <!-- data_loader.js가 CSV에서 동적 생성 -->
              </div>
            </div>
          </div>
        </div>
      </div>

    </aside>

  </div><!-- /#app -->

  <!-- ===== 로컬 라이브러리 연결 ===== -->
  <script src="External Library/gsap.min.js"></script>
  <script src="data_loader.js"></script>
  <script src="lang.js"></script>
  <script src="script.js"></script>
</body>

</html>
